name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
# NOTE: this is a ready-to-use GitHub Actions workflow.
# To activate CI, move this file to: .github/workflows/ci.yml
# (Our push token could not create workflow files directly.)
