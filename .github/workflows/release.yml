# ======================================================
# BLACKBOX LAB — RELEASE WORKFLOW
#
# Releasing: bump version in package.json, then
#   git tag v0.4.0 && git push --tags
# GitHub builds Windows, macOS and Linux packages and
# attaches them to a DRAFT release for you to publish.
# ======================================================

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npm run make
      - name: Attach packages to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            out/make/**/*.zip
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/*.deb
            out/make/**/*.rpm
            out/make/**/*.dmg
